name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          envs: OPENAI_API_KEY,ENCRYPTION_KEY,ADMIN_PASSWORD,VITE_GOOGLE_CLIENT_ID,CHANNEL_TALK_URL
          script: |
            cd ~/document-chatbot_practice
            git pull
            cat > backend/.env << EOF
            OPENAI_API_KEY=$OPENAI_API_KEY
            ENCRYPTION_KEY=$ENCRYPTION_KEY
            ADMIN_PASSWORD=$ADMIN_PASSWORD
            MODEL_NAME=gpt-5-mini
            CHANNEL_TALK_URL=$CHANNEL_TALK_URL
            EOF
            echo "VITE_GOOGLE_CLIENT_ID=$VITE_GOOGLE_CLIENT_ID" > frontend/.env
            source backend/venv/bin/activate
            pip install -r backend/requirements.txt
            cd frontend && npm install && npm run build
            sudo systemctl restart chatbot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          CHANNEL_TALK_URL: ${{ secrets.CHANNEL_TALK_URL }}
